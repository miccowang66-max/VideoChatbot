  <!-- Custom CSS for Chatbot Plugin -->
  <style>
    /* Scoped Chatbot styling */
    .chatbot-scroll::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    .chatbot-scroll::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.01);
      border-radius: 99px;
    }
    .chatbot-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 107, 0, 0.3);
      border-radius: 99px;
    }
    .chatbot-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 107, 0, 0.6);
    }

    .chatbot-glass-panel {
      background: rgba(13, 14, 22, 0.94);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.7), 
                  0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    }
    
    .chatbot-glass-card {
      background: rgba(25, 27, 40, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s ease;
    }
    .chatbot-glass-card:hover {
      background: rgba(32, 34, 52, 0.85);
      border-color: rgba(0, 242, 254, 0.3);
      transform: translateY(-1px);
    }

    @keyframes chatbot-float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    
    .chatbot-btn-float {
      animation: chatbot-float 4s ease-in-out infinite;
    }

    @keyframes chatbot-fadeInUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .chatbot-animate-fade-in-up {
      animation: chatbot-fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Override input placeholder in dark context */
    #chatbot-user-input::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }
  </style>
</head>

  </header>

  </main>

        words: ["搞笑", "喜劇", "幽默", "爆笑", "開懷大笑", "歡樂", "放鬆", "開心", "有趣", "無厘頭", "笑死", "笑話"],
        category: "喜剧",
        reply: "想放鬆一下？這幾部經典喜劇絕對能讓您大笑開懷、忘卻煩惱... 🎭😂"
      },
      scifi: {
        words: ["科幻", "宇宙", "未來", "外星人", "末日", "時空旅行", "平行宇宙", "機器人", "高科技", "AI", "人工智慧"],
        category: "科幻",
        reply: "探索未知的世界！這幾部科幻神作帶您穿梭時空、探索浩瀚宇宙... 🧠🚀"
      },
      suspense: {
        words: ["懸疑", "燒腦", "推理", "解謎", "驚悚", "恐怖", "反轉", "心理", "智商", "暗黑", "密室", "謀殺", "鬼片", "嚇人"],
        category: "悬疑",
        reply: "挑戰腦力極限！這幾部高分懸疑神作，劇情反轉再反轉... 🧠🔍"
      },
      animation: {
        words: ["動畫", "卡通", "宮崎駿", "吉卜力", "童年", "溫馨", "繪本", "龍貓", "千尋", "動漫"],
        category: "动画",
        reply: "帶您走進奇幻與童真的世界，精選經典動畫作品... 🎨✨"
      },
      war: {
        words: ["戰爭", "歷史", "和平", "軍事", "二戰", "史詩", "納粹", "將軍", "士兵"],
        category: "战争",
        reply: "歷史的迴響與人性的光輝，為您推薦震撼人心的史詩戰爭大片... 🎖️"
      }
    };

    function chatbotHandleQuickAction(actionText) {
      chatbotAppendUserMessage(actionText);
      
      if (actionText === "🍿 盲盒抽片") {
        chatbotTriggerBlindBox();
      } else if (actionText === "🔥 9.5分神作") {
        chatbotTriggerHighScores();
      } else if (actionText.includes("浪漫愛情")) {
        chatbotTriggerSemanticMatch(actionText, "romance");
      } else if (actionText.includes("熱血動作")) {
        chatbotTriggerSemanticMatch(actionText, "action");
      } else if (actionText.includes("燒腦懸疑")) {
        chatbotTriggerSemanticMatch(actionText, "suspense");
      } else if (actionText.includes("催淚劇情")) {
        chatbotTriggerSemanticMatch(actionText, "sadness");
      }
    }

    function chatbotSendMessage() {
      const inputEl = document.getElementById("chatbot-user-input");
      const text = inputEl.value.trim();
      if (!text) return;
      
      chatbotAppendUserMessage(text);
      inputEl.value = "";
      
      chatbotProcessResponse(text);
    }

    function chatbotAppendUserMessage(text) {
      const logs = document.getElementById("chatbot-logs");
      const html = `
        <div class="flex space-x-2.5 max-w-[85%] ml-auto justify-end">
          <div class="space-y-0.5 text-right">
            <span class="text-[9px] text-slate-400 font-semibold tracking-wide">YOU</span>
            <div class="px-3.5 py-2.5 bg-gradient-to-r from-cyan-500/20 to-indigo-500/20 border border-cyan-500/20 rounded-2xl rounded-tr-none text-xs text-cyan-50 leading-relaxed shadow-md">
              \${chatbotEscapeHtml(text)}
            </div>
          </div>
          <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-cyan-400/10 border border-cyan-400/30 flex items-center justify-center text-sm">👤</div>
        </div>
      `;
      logs.insertAdjacentHTML('beforeend', html);
      chatbotScrollToBottom();
    }

    function chatbotEscapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Auto scroll chat list smoothly
    function chatbotScrollToBottom() {
      const logs = document.getElementById("chatbot-logs");
      logs.scrollTo({
        top: logs.scrollHeight,
        behavior: 'smooth'
      });
    }

    // Create and append a Typing Loader bubble
    function chatbotCreateIndicator() {
      const logs = document.getElementById("chatbot-logs");
      const id = "chatbot-typing-" + Date.now();
      const html = `
        <div id="\${id}" class="flex space-x-2.5 max-w-[85%] chatbot-animate-fade-in-up">
          <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-cyan-500/20 border border-cyan-400/30 flex items-center justify-center text-sm">🤖</div>
          <div class="space-y-0.5">
            <span class="text-[9px] text-slate-400 font-semibold tracking-wide">MOVIEMIND BOT</span>
            <div class="flex items-center space-x-1 px-3 py-2 bg-white/5 rounded-2xl rounded-tl-none border border-white/5 shadow-md w-16">
              <span class="w-1.5 h-1.5 bg-[#ff6b00] rounded-full animate-bounce" style="animation-delay: 0ms"></span>
              <span class="w-1.5 h-1.5 bg-[#ff6b00] rounded-full animate-bounce" style="animation-delay: 150ms"></span>
              <span class="w-1.5 h-1.5 bg-[#ff6b00] rounded-full animate-bounce" style="animation-delay: 300ms"></span>
            </div>
          </div>
        </div>
      `;
      logs.insertAdjacentHTML('beforeend', html);
      chatbotScrollToBottom();
      return id;
    }

    function chatbotRemoveIndicator(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function chatbotSimulateTypewriter(introText, movies) {
      const typingId = chatbotCreateIndicator();
      
      setTimeout(() => {
        chatbotRemoveIndicator(typingId);
        
        const logs = document.getElementById("chatbot-logs");
        const uniqueId = "chatbot-msg-" + Date.now();
        
        const botHtml = `
          <div class="flex space-x-2.5 max-w-[85%] chatbot-animate-fade-in-up">
            <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-cyan-500/20 border border-cyan-400/30 flex items-center justify-center text-sm">🤖</div>
            <div class="space-y-2 flex-1">
              <span class="text-[9px] text-slate-400 font-semibold tracking-wide">MOVIEMIND BOT</span>
              <div id="\${uniqueId}-text" class="px-3 py-2.5 bg-white/5 rounded-2xl rounded-tl-none border border-white/5 text-xs leading-relaxed text-slate-200 shadow-md block font-medium"></div>
              <div id="\${uniqueId}-cards" class="flex flex-col space-y-3.5 mt-2.5 hidden"></div>
            </div>
          </div>
        `;
        logs.insertAdjacentHTML('beforeend', botHtml);
        
        const textEl = document.getElementById(`\${uniqueId}-text`);
        const cardsEl = document.getElementById(`\${uniqueId}-cards`);
        
        let idx = 0;
        function type() {
          if (idx < introText.length) {
            textEl.innerHTML += introText.charAt(idx);
            idx++;
            chatbotScrollToBottom();
            setTimeout(type, 15);
          } else {
            if (movies && movies.length > 0) {
              chatbotRenderCards(cardsEl, movies);
            }
          }
        }
        type();
      }, 500);
    }

    // Generate Card HTML and render into container
    function chatbotRenderCards(container, movies) {
      container.classList.remove('hidden');
      
      movies.forEach((movie, idx) => {
        const starCount = Math.min(5, Math.max(1, Math.round(movie.score / 2)));
        let stars = "";
        for (let s = 0; s < 5; s++) {
          stars += (s < starCount) ? "<span class='text-amber-400'>★</span>" : "<span class='text-slate-600'>★</span>";
        }

        // Categories list conversion (limit to 2 badges for compact widget)
        const badges = movie.categories.split(',')
          .slice(0, 2)
          .map(cat => `<span class="bg-white/5 border border-white/10 text-slate-300 text-[9px] px-1.5 py-0.5 rounded font-medium">\${cat.trim()}</span>`)
          .join(" ");

        const cardHtml = `
          <div class="chatbot-glass-card rounded-xl overflow-hidden flex flex-row h-24 chatbot-animate-fade-in-up" style="animation-delay: \${idx * 100}ms">
            <!-- Poster left side -->
            <div class="w-16 h-full relative bg-slate-900 flex-shrink-0">
              <div class="absolute inset-0 bg-gradient-to-r from-slate-900 to-slate-800 animate-pulse"></div>
              <img src="\${movie.poster}" alt="\${movie.title}"
                   class="w-full h-full object-cover relative z-10 opacity-0 transition-opacity"
                   onload="this.classList.remove('opacity-0'); this.classList.add('opacity-100');"
                   onerror="this.src='https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=300&auto=format&fit=crop'; this.classList.remove('opacity-0'); this.classList.add('opacity-100');">
            </div>
            <!-- Info right side -->
            <div class="flex-1 p-2.5 flex flex-col justify-between overflow-hidden">
              <div class="space-y-0.5">
                <h3 class="font-title font-bold text-xs text-slate-100 truncate m-0" title="\${movie.title}">
                  \${movie.title.split(' - ')[0]}
                </h3>
                <div class="flex items-center space-x-1.5 text-[10px]">
                  <div class="flex text-[11px]">\${stars}</div>
                  <span class="text-slate-500">|</span>
                  <span class="text-[#ff6b00] font-bold">\${movie.score.toFixed(1)}</span>
                </div>
              </div>
              
              <div class="flex items-center justify-between mt-1">
                <div class="flex space-x-1 overflow-hidden">\${badges}</div>
                <a href="\${movie.url}" target="_blank"
                   class="bg-cyan-500/10 hover:bg-cyan-500/20 border border-cyan-400/30 hover:border-cyan-400/50 text-cyan-300 text-[10px] font-bold px-2 py-1 rounded transition-all flex items-center space-x-0.5">
                  <span>詳情</span>
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-2.5 w-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                  </svg>
                </a>
              </div>
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHtml);
      });
      
      setTimeout(chatbotScrollToBottom, 150);
    }

    function chatbotTriggerBlindBox() {
      const prompts = [
        "正在從 100 部神作中為您盲抽... 🍿",
        "神秘電影抽取中，精選熱門經典... 🔮",
        "輪盤滾動中... 正在隨機選取經典神片... 🎬"
      ];
      const randomPrompt = prompts[Math.floor(Math.random() * prompts.length)];
      const typingId = chatbotCreateIndicator();
      
      setTimeout(() => {
        chatbotRemoveIndicator(typingId);
        const randIdx = Math.floor(Math.random() * chatbotMovieData.length);
        const movie = chatbotMovieData[randIdx];
        const intro = `🎉 恭喜！為您抽中了第 \${movie.id} 號神作：<b>《\${movie.title.split(' - ')[0]}》</b>！評分 \${movie.score} 分。祝您觀影愉快！`;
        chatbotSimulateTypewriter(intro, [movie]);
      }, 1000);
    }

    function chatbotTriggerHighScores() {
      const high = chatbotMovieData.filter(m => m.score >= 9.5);
      const selected = [];
      const temp = [...high];
      for (let i = 0; i < 3 && temp.length > 0; i++) {
        const r = Math.floor(Math.random() * temp.length);
        selected.push(temp.splice(r, 1)[0]);
      }
      const intro = `🔥 這些是評分高達 9.5 分以上的頂級傳奇神作！每一部都是必看經典：`;
      chatbotSimulateTypewriter(intro, selected);
    }

    function chatbotTriggerSemanticMatch(queryText, intentKey) {
      const intent = chatbotIntents[intentKey];
      const matched = chatbotMovieData.filter(m => m.categories.includes(intent.category));
      matched.sort((a, b) => b.score - a.score);
      
      // Select 3 random from top 15
      const top = matched.slice(0, 15);
      const selected = [];
      const temp = [...top];
      for (let i = 0; i < 3 && temp.length > 0; i++) {
        const r = Math.floor(Math.random() * temp.length);
        selected.push(temp.splice(r, 1)[0]);
      }
      chatbotSimulateTypewriter(intent.reply, selected);
    }

    function chatbotProcessResponse(rawText) {
      const query = rawText.toLowerCase().trim();
      
      // 1. Semantic Match
      let matchedKey = null;
      let maxCount = 0;
      for (const [key, config] of Object.entries(chatbotIntents)) {
        let count = 0;
        config.words.forEach(w => { if (query.includes(w)) count++; });
        if (count > maxCount) {
          maxCount = count;
          matchedKey = key;
        }
      }
      
      if (matchedKey && maxCount > 0) {
        chatbotTriggerSemanticMatch(rawText, matchedKey);
        return;
      }

      // 2. Fuzzy Text Search
      const fuzzy = chatbotMovieData.filter(m => {
        return m.title.toLowerCase().includes(query) || 
               m.categories.toLowerCase().includes(query) ||
               m.country.toLowerCase().includes(query);
      });

      if (fuzzy.length > 0) {
        fuzzy.sort((a, b) => b.score - a.score);
        const selected = fuzzy.slice(0, 3);
        const intro = `🔍 為您尋找到 \${fuzzy.length} 部與「\${rawText}」相關的影片！推薦以下最受好評的作品：`;
        chatbotSimulateTypewriter(intro, selected);
      } else {
        // 3. Fallback
        const fallback = `抱歉，我沒有在資料庫中找到與『\${rawText}』直接相關的電影。這可能超出了 100 部神作範圍！<br><br>不過沒關係，您可以點擊 <b>🍿 盲盒抽片</b>，或者讓我推薦幾部 <b>🔥 9.5分神作</b> 喔！`;
        chatbotSimulateTypewriter(fallback, []);
      }
    }
  </script>
