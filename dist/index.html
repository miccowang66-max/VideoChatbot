        reply: "想放鬆一下？這幾部經典喜劇絕對能讓您捧腹大笑、忘卻煩惱... 🎭😂"
      },
      scifi: {
        words: ["科幻", "宇宙", "未來", "外星人", "末日", "時空旅行", "平行宇宙", "機器人", "高科技", "AI", "人工智慧"],
        category: "科幻",
        reply: "探索未知的世界！這幾部科幻神作帶您穿梭時空、探索浩瀚宇宙... 🧠🚀"
      },
      suspense: {
        words: ["懸疑", "燒腦", "推理", "解謎", "驚悚", "恐怖", "反轉", "心理", "智商", "暗黑", "密室", "謀殺", "鬼片", "嚇人"],
        category: "悬疑",
        reply: "準備好您的腦細胞！這幾部高分懸疑驚悚神作，劇情反轉再反轉... 🧠🔍"
      },
      animation: {
        words: ["動畫", "卡通", "宮崎駿", "吉卜力", "童年", "溫馨", "繪本", "龍貓", "千尋", "動漫"],
        category: "动画",
        reply: "帶您走進充滿奇幻與童真的世界，精選經典動畫作品... 🎨✨"
      },
      war: {
        words: ["戰爭", "歷史", "和平", "軍事", "二戰", "史詩", "納粹", "將軍", "士兵"],
        category: "战争",
        reply: "歷史的迴響與人性的光輝，為您推薦震撼人心的史詩戰爭大片... 🎖️"
      }
    };

    // Handle Quick Reply Action Button Click
    function handleQuickAction(actionText) {
      appendUserMessage(actionText);
      
      if (actionText === "🍿 盲盒抽片") {
        triggerBlindBox();
      } else if (actionText === "🔥 9.5分神作") {
        triggerHighScores();
      } else if (actionText.includes("浪漫愛情")) {
        triggerSemanticMatch("浪漫愛情", "romance");
      } else if (actionText.includes("熱血動作")) {
        triggerSemanticMatch("熱血動作", "action");
      } else if (actionText.includes("燒腦懸疑")) {
        triggerSemanticMatch("燒腦懸疑", "suspense");
      } else if (actionText.includes("催淚劇情")) {
        triggerSemanticMatch("催淚劇情", "sadness");
      }
    }

    // Main trigger function for users sending input
    function sendMessage() {
      const inputEl = document.getElementById("user-input");
      const text = inputEl.value.trim();
      if (!text) return;
      
      appendUserMessage(text);
      inputEl.value = "";
      
      // Parse User Intent
      processBotResponse(text);
    }

    // Add user bubble to chat logs
    function appendUserMessage(text) {
      const chatLogs = document.getElementById("chat-logs");
      const userMsgHtml = `
        <div class="flex space-x-3 max-w-[85%] ml-auto justify-end">
          <div class="space-y-1 text-right">
            <span class="text-[11px] text-slate-400 block font-semibold tracking-wider">YOU</span>
            <div class="px-4 py-3 bg-gradient-to-r from-cyan-500/20 to-indigo-500/20 border border-cyan-500/20 rounded-2xl rounded-tr-none text-sm text-cyan-50 leading-relaxed shadow-md">
              \${escapeHtml(text)}
            </div>
          </div>
          <div class="flex-shrink-0 w-9 h-9 rounded-lg bg-cyan-400/10 border border-cyan-400/30 flex items-center justify-center text-lg">👤</div>
        </div>
      `;
      chatLogs.insertAdjacentHTML('beforeend', userMsgHtml);
      scrollToBottom();
    }

    // Escaping helper to prevent XSS
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    // Auto scroll chat list smoothly
    function scrollToBottom() {
      const chatLogs = document.getElementById("chat-logs");
      chatLogs.scrollTo({
        top: chatLogs.scrollHeight,
        behavior: 'smooth'
      });
    }

    // Create and append a Typing Loader bubble
    function createTypingIndicator() {
      const chatLogs = document.getElementById("chat-logs");
      const indicatorId = "typing-" + Date.now();
      const indicatorHtml = `
        <div id="\${indicatorId}" class="flex space-x-3 max-w-[85%] animate-fade-in-up">
          <div class="flex-shrink-0 w-9 h-9 rounded-lg bg-cyan-500/20 border border-cyan-400/30 flex items-center justify-center text-lg">🤖</div>
          <div class="space-y-1">
            <span class="text-[11px] text-slate-400 block font-semibold tracking-wider">MOVIEMIND BOT</span>
            <div class="flex items-center space-x-1.5 px-4 py-3 bg-white/5 rounded-2xl rounded-tl-none border border-white/5 shadow-md w-20">
              <span class="w-2.5 h-2.5 bg-[#ff6b00] rounded-full animate-bounce" style="animation-duration: 0.8s; animation-delay: 0ms"></span>
              <span class="w-2.5 h-2.5 bg-[#ff6b00] rounded-full animate-bounce" style="animation-duration: 0.8s; animation-delay: 150ms"></span>
              <span class="w-2.5 h-2.5 bg-[#ff6b00] rounded-full animate-bounce" style="animation-duration: 0.8s; animation-delay: 300ms"></span>
            </div>
          </div>
        </div>
      `;
      chatLogs.insertAdjacentHTML('beforeend', indicatorHtml);
      scrollToBottom();
      return indicatorId;
    }

    // Remove Typing Indicator
    function removeTypingIndicator(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    // Simulate Typewriter text printing, and then load movie cards
    function simulateTypewriterResponse(introText, moviesList) {
      const typingId = createTypingIndicator();
      
      // Delay to represent thinking
      setTimeout(() => {
        removeTypingIndicator(typingId);
        
        const chatLogs = document.getElementById("chat-logs");
        const uniqueMsgId = "msg-" + Date.now();
        
        // Append response scaffold
        const botMsgHtml = `
          <div class="flex space-x-3 max-w-[85%] animate-fade-in-up">
            <div class="flex-shrink-0 w-9 h-9 rounded-lg bg-cyan-500/20 border border-cyan-400/30 flex items-center justify-center text-lg">🤖</div>
            <div class="space-y-2 flex-1">
              <span class="text-[11px] text-slate-400 block font-semibold tracking-wider">MOVIEMIND BOT</span>
              <div id="\${uniqueMsgId}-text" class="px-4 py-3 bg-white/5 rounded-2xl rounded-tl-none border border-white/5 text-sm leading-relaxed text-slate-200 shadow-md inline-block font-medium"></div>
              <div id="\${uniqueMsgId}-cards" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-3 hidden"></div>
            </div>
          </div>
        `;
        chatLogs.insertAdjacentHTML('beforeend', botMsgHtml);
        
        const textContainer = document.getElementById(`\${uniqueMsgId}-text`);
        const cardsContainer = document.getElementById(`\${uniqueMsgId}-cards`);
        
        // Typewriter simulation
        let charIndex = 0;
        const typingSpeed = 15; // ms per char
        
        function type() {
          if (charIndex < introText.length) {
            textContainer.innerHTML += introText.charAt(charIndex);
            charIndex++;
            scrollToBottom();
            setTimeout(type, typingSpeed);
          } else {
            // Typing finished, show movie cards
            if (moviesList && moviesList.length > 0) {
              renderMovieCards(cardsContainer, moviesList);
            }
          }
        }
        
        type();
      }, 500);
    }

    // Generate Card HTML and render into container
    function renderMovieCards(container, movies) {
      container.classList.remove('hidden');
      
      movies.forEach((movie, i) => {
        // Generate Star Rating HTML
        const starCount = Math.min(5, Math.max(1, Math.round(movie.score / 2)));
        let starsHtml = "";
        for (let s = 0; s < 5; s++) {
          if (s < starCount) {
            starsHtml += "<span class='text-amber-400'>★</span>";
          } else {
            starsHtml += "<span class='text-slate-600'>★</span>";
          }
        }

        // Categories list conversion
        const categoryBadges = movie.categories.split(',')
          .map(cat => `<span class="bg-white/5 border border-white/10 text-slate-300 text-[10px] px-2 py-0.5 rounded-full font-medium">\${cat.trim()}</span>`)
          .join(" ");

        const cardHtml = `
          <div class="glass-card rounded-2xl overflow-hidden flex flex-col h-full animate-fade-in-up" style="animation-delay: \${i * 120}ms">
            <!-- Movie Poster with Elegant Skeleton Loader -->
            <div class="relative h-44 overflow-hidden bg-slate-900 group">
              <!-- Animated loading indicator behind cover -->
              <div class="absolute inset-0 bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 animate-pulse"></div>
              
              <img src="\${movie.poster}" alt="\${movie.title}" 
                   class="w-full h-full object-cover relative z-10 transition-all duration-700 ease-out group-hover:scale-105 opacity-0"
                   onload="this.classList.remove('opacity-0'); this.classList.add('opacity-100');"
                   onerror="this.src='https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=600&auto=format&fit=crop'; this.classList.remove('opacity-0'); this.classList.add('opacity-100');">
              
              <!-- Top Score Overlay Tag -->
              <div class="absolute top-3 right-3 z-20 bg-black/60 backdrop-blur-md border border-white/10 px-2 py-0.5 rounded-lg text-xs font-bold flex items-center space-x-1">
                <span class="text-amber-400 font-bold">\${movie.score.toFixed(1)}</span>
              </div>
            </div>
            
            <!-- Movie Info Content -->
            <div class="p-4 flex-1 flex flex-col justify-between space-y-3.5">
              <div class="space-y-2">
                <h3 class="font-title font-bold text-sm text-slate-100 line-clamp-1 group-hover:text-cyan-400 transition-colors" title="\${movie.title}">
                  \${movie.title}
                </h3>
                
                <!-- Stars and basic meta -->
                <div class="flex items-center space-x-2 text-xs">
                  <div class="flex space-x-0.5 text-[13px]">\${starsHtml}</div>
                  <span class="text-slate-500">|</span>
                  <span class="text-slate-400 font-medium">\${movie.runtime}</span>
                </div>

                <!-- Genre Badges -->
                <div class="flex flex-wrap gap-1 mt-1">\${categoryBadges}</div>
              </div>
              
              <!-- Bottom Metadata and Button -->
              <div class="pt-2 border-t border-white/5 flex items-center justify-between mt-auto">
                <span class="text-[10px] text-slate-500 font-medium tracking-wide uppercase truncate max-w-[120px]" title="\${movie.country}">
                  🌍 \${movie.country}
                </span>
                
                <a href="\${movie.url}" target="_blank" 
                   class="bg-cyan-500/10 hover:bg-cyan-500/20 border border-cyan-400/30 hover:border-cyan-400/50 text-cyan-300 text-xs font-semibold px-3 py-1.5 rounded-lg transition-all active:scale-95 flex items-center space-x-1 shadow-sm">
                  <span>查看詳情</span>
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                  </svg>
                </a>
              </div>
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHtml);
      });
      
      // Force smooth scroll after cards appear
      setTimeout(scrollToBottom, 150);
    }

    // Trigger random Blind Box movie selection
    function triggerBlindBox() {
      const waitingPrompts = [
        "正在從 100 部神作中為您盲抽... 🍿",
        "神秘大獎抽選中，正在過濾經典佳作... 🔮",
        "影碟滾動中... 正在隨機選取一部您不能錯過的神片... 🎬"
      ];
      
      const randomPrompt = waitingPrompts[Math.floor(Math.random() * waitingPrompts.length)];
      const typingId = createTypingIndicator();
      
      // Delay for 1 second suspense
      setTimeout(() => {
        removeTypingIndicator(typingId);
        
        // Pick one completely random movie
        const randomIndex = Math.floor(Math.random() * movieData.length);
        const selectedMovie = movieData[randomIndex];
        
        const introText = `🎉 恭喜！盲盒為您抽中了第 \${selectedMovie.id} 號神作：<b>《\${selectedMovie.title.split(' - ')[0]}》</b>！這部影片的評分高達 \${selectedMovie.score} 分。祝您觀影愉快！`;
        
        simulateTypewriterResponse(introText, [selectedMovie]);
      }, 1000);
    }

    // Trigger high scores recommendation
    function triggerHighScores() {
      // Filter score >= 9.5
      const highScores = movieData.filter(m => m.score >= 9.5);
      
      // Randomly pick 4 from the list of 9.5+ movies
      const selected = [];
      const tempArray = [...highScores];
      for (let i = 0; i < 4 && tempArray.length > 0; i++) {
        const idx = Math.floor(Math.random() * tempArray.length);
        selected.push(tempArray.splice(idx, 1)[0]);
      }

      const introText = `🔥 這些是評分高達 9.5 分以上的影史傳奇級神作！每一部都是無懈可擊的藝術殿堂經典，為您推薦以下佳作：`;
      simulateTypewriterResponse(introText, selected);
    }

    // Trigger recommendation based on specific intent
    function triggerSemanticMatch(queryText, intentKey) {
      const intent = intentKeywords[intentKey];
      const matchedMovies = movieData.filter(m => m.categories.includes(intent.category));
      
      // Get top scores, pick 4 random top movies to vary results
      matchedMovies.sort((a, b) => b.score - a.score);
      const topMovies = matchedMovies.slice(0, 15);
      
      const selected = [];
      const tempArray = [...topMovies];
      for (let i = 0; i < 4 && tempArray.length > 0; i++) {
        const idx = Math.floor(Math.random() * tempArray.length);
        selected.push(tempArray.splice(idx, 1)[0]);
      }

      simulateTypewriterResponse(intent.reply, selected);
    }

    // Process Bot Semantic Response for user text
    function processBotResponse(rawText) {
      const query = rawText.toLowerCase().trim();
      
      // 1. Check for specific categories / intents first
      let matchedIntentKey = null;
      let highestMatchCount = 0;
      
      for (const [key, config] of Object.entries(intentKeywords)) {
        let count = 0;
        config.words.forEach(w => {
          if (query.includes(w)) count++;
        });
        
        if (count > highestMatchCount) {
          highestMatchCount = count;
          matchedIntentKey = key;
        }
      }
      
      if (matchedIntentKey && highestMatchCount > 0) {
        triggerSemanticMatch(rawText, matchedIntentKey);
        return;
      }

      // 2. Failsafe: Fuzzy text searching on Title, Category, Country
      const fuzzyMatches = movieData.filter(m => {
        return m.title.toLowerCase().includes(query) || 
               m.categories.toLowerCase().includes(query) ||
               m.country.toLowerCase().includes(query) ||
               (m.release_date && m.release_date.includes(query));
      });

      if (fuzzyMatches.length > 0) {
        // Sort by score
        fuzzyMatches.sort((a, b) => b.score - a.score);
        
        // Pick up to 4 movies
        const selected = fuzzyMatches.slice(0, 4);
        const introText = `🔍 我在 100 部神作中為您找到了 \${fuzzyMatches.length} 部與「\${rawText}」相關的影片！為您推薦評分最高的幾部：`;
        simulateTypewriterResponse(introText, selected);
      } else {
        // 3. Fallback: No matches found
        const fallbackText = `抱歉，我沒有在我們的 100 部神作中找到與『\${rawText}』直接相關的電影。這可能是個冷門佳作，或者超出了我的資料庫範圍！<br><br>不過沒關係，您可以點擊下方的 <b>🍿 盲盒抽片</b>，或者讓我推薦幾部 <b>🔥 9.5分神作</b> 喔！`;
        simulateTypewriterResponse(fallbackText, []);
      }
    }
  </script>
